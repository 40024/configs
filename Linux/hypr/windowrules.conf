# See https://wiki.hyprland.org/Configuring/Window-Rules/

# '$&' is a hyde specific shorthand for "override" \\ analogous to a reference
# This symbol indicates that the following values will override the default configuration
$&=override

# windowrulev2 = opacity 0.90 $& 0.90 $& 1,class:^(firefox)$
# windowrulev2 = opacity 0.90 $& 0.90 $& 1,class:^(Brave-browser)$
# windowrulev2 = opacity 0.80 $& 0.80 $& 1,class:^(code-oss)$
# windowrulev2 = opacity 0.80 $& 0.80 $& 1,class:^([Cc]ode)$
# windowrulev2 = opacity 0.80 $& 0.80 $& 1,class:^(code-url-handler)$
# windowrulev2 = opacity 0.80 $& 0.80 $& 1,class:^(code-insiders-url-handler)$
# windowrulev2 = opacity 0.80 $& 0.80 $& 1,class:^(org.kde.dolphin)$
# windowrulev2 = opacity 0.80 $& 0.80 $& 1,class:^(org.kde.ark)$
# windowrulev2 = opacity 0.80 $& 0.80 $& 1,class:^(nwg-look)$
# windowrulev2 = opacity 0.80 $& 0.80 $& 1,class:^(qt5ct)$
# windowrulev2 = opacity 0.80 $& 0.80 $& 1,class:^(qt6ct)$
# windowrulev2 = opacity 0.80 $& 0.80 $& 1,class:^(kvantummanager)$
# windowrulev2 = opacity 0.80 $& 0.70 $& 1,class:^(org.pulseaudio.pavucontrol)$
# windowrulev2 = opacity 0.80 $& 0.70 $& 1,class:^(blueman-manager)$
# windowrulev2 = opacity 0.80 $& 0.70 $& 1,class:^(nm-applet)$
# windowrulev2 = opacity 0.80 $& 0.70 $& 1,class:^(nm-connection-editor)$
# windowrulev2 = opacity 0.80 $& 0.70 $& 1,class:^(org.kde.polkit-kde-authentication-agent-1)$
# windowrulev2 = opacity 0.80 $& 0.70 $& 1,class:^(polkit-gnome-authentication-agent-1)$
# windowrulev2 = opacity 0.80 $& 0.70 $& 1,class:^(org.freedesktop.impl.portal.desktop.gtk)$
# windowrulev2 = opacity 0.80 $& 0.70 $& 1,class:^(org.freedesktop.impl.portal.desktop.hyprland)$
# windowrulev2 = opacity 0.70 $& 0.70 $& 1,class:^([Ss]team)$
# windowrulev2 = opacity 0.70 $& 0.70 $& 1,class:^(steamwebhelper)$
# windowrulev2 = opacity 0.70 $& 0.70 $& 1,class:^([Ss]potify)$
# windowrulev2 = opacity 0.70 $& 0.70 $& 1,initialTitle:^(Spotify Free)$
# windowrulev2 = opacity 0.70 $& 0.70 $& 1,initialTitle:^(Spotify Premium)$
 
# Kitty opacity
windowrule = opacity 0.80 0.80 1, match:class ^kitty$

# Image viewers / media players
windowrule = float on, match:class ^org.gnome.Loupe$
windowrule = center on, match:class ^org.gnome.Loupe$

windowrule = float on, match:class ^feh$
windowrule = center on, match:class ^feh$

windowrule = float on, match:class ^mpv$
windowrule = center on, match:class ^mpv$

# Restrict max size pavucontrol
windowrule = max_size 600 700, match:class ^org.pulseaudio.pavucontrol$

# Default GTK/Qt apps
windowrule = opacity 0.90 0.90, match:class ^com.github.rafostar.Clapper$
windowrule = opacity 0.80 0.80, match:class ^com.github.tchx84.Flatseal$
windowrule = opacity 0.80 0.80, match:class ^hu.kramo.Cartridges$
windowrule = opacity 0.80 0.80, match:class ^com.obsproject.Studio$
windowrule = opacity 0.80 0.80, match:class ^gnome-boxes$
windowrule = opacity 0.80 0.80, match:class ^vesktop$
windowrule = opacity 0.80 0.80, match:class ^WebCord$
windowrule = opacity 0.80 0.80, match:class ^ArmCord$
windowrule = opacity 0.80 0.80, match:class ^app.drey.Warp$
windowrule = opacity 0.80 0.80, match:class ^net.davidotek.pupgui2$
windowrule = opacity 0.80 0.80, match:class ^yad$
windowrule = opacity 0.80 0.80, match:class ^Signal$
windowrule = opacity 0.80 0.80, match:class ^io.github.alainm23.planify$
windowrule = opacity 0.80 0.80, match:class ^io.gitlab.theevilskeleton.Upscaler$
windowrule = opacity 0.80 0.80, match:class ^com.github.unrud.VideoDownloader$
windowrule = opacity 0.80 0.80, match:class ^io.gitlab.adhami3310.Impression$
windowrule = opacity 0.80 0.80, match:class ^io.missioncenter.MissionCenter$
windowrule = opacity 0.80 0.80, match:class ^io.github.flattool.Warehouse$

# Dolphin dialogs
windowrule = float on, match:class ^org.kde.dolphin$, match:title (Progress Dialog — Dolphin|Copying — Dolphin)

# Firefox dialogs
windowrule = float on, match:title ^About Mozilla Firefox$
windowrule = float on, match:class ^firefox$, match:title (Picture-in-Picture|Library)

# top/btop/htop in kitty
windowrule = float on, match:class ^kitty$, match:title ^(top|btop|htop)$

# Misc apps
windowrule = float on, match:class ^vlc$
windowrule = float on, match:class ^kvantummanager$
windowrule = float on, match:class ^qt5ct$
windowrule = float on, match:class ^qt6ct$
windowrule = float on, match:class ^nwg-look$
windowrule = float on, match:class ^org.kde.ark$
windowrule = float on, match:class ^org.pulseaudio.pavucontrol$
windowrule = float on, match:class ^blueman-manager$
windowrule = float on, match:class ^nm-applet$
windowrule = float on, match:class ^nm-connection-editor$
windowrule = float on, match:class ^org.kde.polkit-kde-authentication-agent-1$

windowrule = float on, match:class ^com.github.rafostar.Clapper$
windowrule = float on, match:class ^app.drey.Warp$
windowrule = float on, match:class ^net.davidotek.pupgui2$
windowrule = float on, match:class ^yad$
windowrule = float on, match:class ^eog$
windowrule = float on, match:class ^io.github.alainm23.planify$
windowrule = float on, match:class ^io.gitlab.theevilskeleton.Upscaler$
windowrule = float on, match:class ^com.github.unrud.VideoDownloader$
windowrule = float on, match:class ^io.gitlab.adhami3310.Impression$
windowrule = float on, match:class ^io.missioncenter.MissionCenter$

# Hyprland v0.52 breaks this, uncomment later to see if this was a one-off
# windowrule = float,initialtitle:^(Open File)$
# windowrule = float,initialTitle:^(Open File)$
windowrule = float on, match:title ^(Choose Files)$
windowrule = float on, match:title ^(Save As)$
windowrule = float on, match:title ^(Confirm to replace files)$
windowrule = float on, match:title ^(File Operation Progress)$
windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$

# █░░ ▄▀█ █▄█ █▀▀ █▀█   █▀█ █░█ █░░ █▀▀ █▀
# █▄▄ █▀█ ░█░ ██▄ █▀▄   █▀▄ █▄█ █▄▄ ██▄ ▄█

layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0, match:namespace rofi
layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 0, match:namespace notifications
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0, match:namespace swaync-notification-window
layerrule = blur on, match:namespace swaync-control-center
layerrule = ignore_alpha 0, match:namespace swaync-control-center
layerrule = blur on, match:namespace logout_dialog
